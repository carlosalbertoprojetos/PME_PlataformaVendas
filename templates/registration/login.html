{% extends "base.html" %}

{% block title %}Entrar - PME Plataforma{% endblock %}

{% block content %}
<h1>Entrar</h1>

{% if form.errors %}
    <p>Usuario ou senha invalidos.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Entrar</button>
</form>
{% endblock %}
